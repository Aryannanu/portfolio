<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio UI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f0f0f;
    padding:30px;
    color:white;
    min-height:100vh;
}

.container{
    display:flex;
    gap:25px;
    max-width:1400px;
    margin:0 auto;
}

.left{
    width:320px;
    min-width:280px;
    background:#1b1b1b;
    border:1px solid #2c2c2c;
    border-radius:30px;
    padding:30px 22px;
    position:sticky;
    top:30px;
    height:calc(100vh - 60px);
    overflow:hidden;
}

.profile{
    text-align:center;
}

.img-box{
    width:160px;
    height:160px;
    background:#2a2a2a;
    margin:auto;
    border-radius:30px;
    overflow:hidden;
}

.img-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.name{
    font-size:22px;
    font-weight:600;
    margin-top:22px;
}

.job{
    display:inline-block;
    background:#292929;
    padding:10px 20px;
    border-radius:12px;
    margin-top:15px;
    color:#cfcfcf;
    font-size:14px;
}

.line{
    width:100%;
    height:1px;
    background:#2f2f2f;
    margin:30px 0;
}

.info-row{
    display:flex;
    flex-direction:column;
}

.info{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:25px;
}

.icon{
    width:52px;
    height:52px;
    min-width:52px;
    border-radius:14px;
    background:#242424;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    color:#f6c453;
}

.text small{
    color:#8c8c8c;
    font-size:12px;
    display:block;
    margin-bottom:4px;
}

.text p{
    font-size:14px;
    word-break:break-word;
}

.right{
    flex:1;
    background:#1b1b1b;
    border-radius:30px;
    border:1px solid #2c2c2c;
    height:calc(100vh - 60px);
    overflow-y:auto;
    position:relative;
    min-width:0;
}

.menu{
    position:absolute;
    top:0;
    right:0;
    background:#242424;
    padding:22px 35px;
    display:flex;
    gap:35px;
    border-top-right-radius:30px;
    border-bottom-left-radius:30px;
    z-index:10;
}

.menu button{
    background:none;
    border:none;
    color:#cfcfcf;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
    white-space:nowrap;
}

.menu button:hover{ color:#f6c453; }

.active{ color:#f6c453 !important; }

.content{ padding:40px; }

.title{
    font-size:28px;
    font-weight:700;
}

.yellow-line{
    width:55px;
    height:5px;
    border-radius:10px;
    background:#f6c453;
    margin:15px 0 30px;
}

.para{
    color:#b5b5b5;
    line-height:1.9;
    margin-bottom:18px;
    font-size:15px;
}

.heading{
    font-size:22px;
    font-weight:600;
    margin-top:35px;
    margin-bottom:25px;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    background:#222;
    border:1px solid #303030;
    border-radius:22px;
    padding:25px;
    display:flex;
    gap:20px;
    flex:1 1 calc(50% - 10px);
    min-width:220px;
}

.card-icon{
    font-size:34px;
    color:#f6c453;
    flex-shrink:0;
}

.card-text h3{ margin-bottom:10px; }

.card-text p{
    color:#b8b8b8;
    line-height:1.7;
    font-size:14px;
}

.hidden{ display:none; }

.placeholder{
    color:#a8a8a8;
    font-size:16px;
    margin-top:30px;
}

.resume-heading{
    font-size:20px;
    font-weight:600;
    margin-top:40px;
    margin-bottom:25px;
}

.resume-card{
    background:#222;
    border:1px solid #303030;
    border-radius:22px;
    padding:22px;
    margin-bottom:20px;
}

.resume-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    flex-wrap:wrap;
    gap:8px;
}

.resume-title{
    font-size:17px;
    font-weight:600;
}

.resume-year{
    color:#f6c453;
    font-size:14px;
    white-space:nowrap;
}

.resume-subtitle{
    color:#c9c9c9;
    margin-bottom:12px;
    font-size:14px;
}

.resume-desc{
    color:#a8a8a8;
    line-height:1.8;
    font-size:14px;
}

.skills-container{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.skill{
    background:#242424;
    border:1px solid #303030;
    padding:12px 20px;
    border-radius:14px;
    color:#f6c453;
    font-size:14px;
    transition:.3s;
}

.skill:hover{ transform:translateY(-4px); }

.resume-download-wrap{ margin-bottom:30px; }

.resume-download-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:#f6c453;
    color:#1b1b1b;
    padding:12px 24px;
    border-radius:14px;
    font-size:14px;
    font-weight:600;
    text-decoration:none;
    transition:.3s;
}

.resume-download-btn:hover{
    background:#e5b33f;
    transform:translateY(-2px);
}

.resume-download-btn.hidden{ display:none; }

.contact-container{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.contact-card{
    background:#222;
    border:1px solid #303030;
    border-radius:22px;
    padding:25px;
    display:flex;
    align-items:center;
    gap:20px;
    flex:1 1 calc(50% - 10px);
    min-width:220px;
}

.contact-icon{
    width:60px;
    height:60px;
    min-width:60px;
    border-radius:18px;
    background:#242424;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    color:#f6c453;
}

.contact-text small{
    color:#8d8d8d;
    display:block;
    margin-bottom:6px;
    font-size:12px;
}

.contact-text a,
.contact-text p{
    color:white;
    text-decoration:none;
    font-size:14px;
    word-break:break-word;
}

.contact-text a:hover{ color:#f6c453; }

.portfolio-filter{
    display:flex;
    gap:15px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.filter-btn{
    background:#242424;
    border:1px solid #303030;
    color:#cfcfcf;
    padding:10px 20px;
    border-radius:14px;
    cursor:pointer;
    font-size:14px;
    transition:.3s;
    font-family:'Poppins',sans-serif;
}

.filter-btn:hover{ color:#f6c453; }

.active-filter{
    background:#f6c453;
    color:#111;
    font-weight:600;
}

.project-container{
    display:flex;
    flex-wrap:wrap;
    gap:22px;
}

.project-card{
    background:#222;
    border:1px solid #303030;
    border-radius:24px;
    overflow:hidden;
    transition:.3s;
    flex:1 1 calc(50% - 11px);
    min-width:260px;
}

.project-card:hover{ transform:translateY(-5px); }

.project-image{
    height:200px;
    overflow:hidden;
}

.project-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.project-content{ padding:22px; }

.project-title{
    font-size:18px;
    font-weight:600;
    margin-bottom:10px;
}

.project-desc{
    color:#b5b5b5;
    line-height:1.8;
    margin-bottom:18px;
    font-size:14px;
}

.tech-stack{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:18px;
}

.tech{
    background:#292929;
    color:#f6c453;
    padding:7px 13px;
    border-radius:10px;
    font-size:13px;
}

.github-btn{
    display:inline-block;
    text-decoration:none;
    background:#f6c453;
    color:#111;
    padding:10px 18px;
    border-radius:12px;
    font-weight:600;
    font-size:14px;
    transition:.3s;
}

.github-btn:hover{ transform:translateY(-3px); }

/* Large Desktop 1280px+ */
@media(min-width:1280px){
    .left{ width:340px; }
    .content{ padding:30px; }
}

/* Small Desktop 1024px-1279px */
@media(max-width:1279px) and (min-width:1024px){
    .left{ width:285px; min-width:260px; }
    .menu{ gap:22px; padding:20px 26px; }
    .content{ padding:35px; }
}

/* Tablet Landscape 768px-1023px */
@media(max-width:1023px) and (min-width:768px){
    body{ padding:20px; }
    .container{ flex-direction:column; gap:20px; }
    .left{ width:100%; min-width:unset; height:auto; position:static; border-radius:24px; padding:26px 22px; overflow:hidden; }
    .profile{ display:flex; align-items:center; gap:24px; text-align:left; }
    .img-box{ width:100px; height:100px; min-width:100px; border-radius:18px; margin:0; }
    .name{ font-size:20px; margin-top:0; }
    .line{ margin:18px 0; }
    .info-row{ flex-direction:row; flex-wrap:wrap; gap:0 20px; }
    .info{ flex:1 1 calc(50% - 10px); min-width:180px; margin-bottom:14px; }
    .right{ height:auto; overflow-y:visible; border-radius:24px; }
    .menu{ position:static; border-radius:24px 24px 0 0; justify-content:center; flex-wrap:wrap; gap:20px; padding:18px 24px; }
    .content{ padding:28px 26px; }
}

/* Tablet Portrait 480px-767px */
@media(max-width:767px) and (min-width:480px){
    body{ padding:14px; }
    .container{ flex-direction:column; gap:14px; }
    .left{ width:100%; min-width:unset; height:auto; position:static; border-radius:20px; padding:20px 16px; overflow:hidden; }
    .img-box{ width:110px; height:110px; border-radius:20px; }
    .name{ font-size:20px; }
    .line{ margin:18px 0; }
    .right{ height:auto; overflow-y:visible; border-radius:20px; }
    .menu{ position:static; border-radius:20px 20px 0 0; justify-content:center; flex-wrap:wrap; gap:12px; padding:14px 16px; }
    .menu button{ font-size:14px; }
    .content{ padding:20px 16px; }
    .card{ flex:1 1 100%; }
    .contact-card{ flex:1 1 100%; }
    .project-card{ flex:1 1 100%; }
    .project-image{ height:180px; }
}

/* Mobile up to 479px */
@media(max-width:479px){
    body{ padding:10px; }
    .container{ flex-direction:column; gap:10px; }
    .left{ width:100%; min-width:unset; height:auto; position:static; border-radius:16px; padding:16px 12px; overflow:hidden; }
    .img-box{ width:90px; height:90px; border-radius:16px; }
    .name{ font-size:18px; margin-top:12px; }
    .job{ font-size:12px; padding:7px 12px; margin-top:8px; }
    .line{ margin:14px 0; }
    .icon{ width:40px; height:40px; min-width:40px; font-size:16px; border-radius:10px; }
    .text small{ font-size:11px; }
    .text p{ font-size:12px; }
    .info{ gap:10px; margin-bottom:12px; }
    .right{ height:auto; overflow-y:visible; border-radius:16px; }
    .menu{ position:static; border-radius:16px 16px 0 0; justify-content:center; flex-wrap:wrap; gap:8px; padding:12px 8px; }
    .menu button{ font-size:12px; }
    .content{ padding:14px 12px; }
    .title{ font-size:22px; }
    .yellow-line{ margin:10px 0 18px; }
    .para{ font-size:13px; }
    .heading{ font-size:18px; margin-top:20px; margin-bottom:14px; }
    .card{ flex:1 1 100%; flex-direction:column; padding:14px; gap:10px; border-radius:14px; }
    .card-icon{ font-size:24px; }
    .card-text h3{ font-size:14px; }
    .resume-heading{ font-size:17px; margin-top:20px; margin-bottom:14px; }
    .resume-card{ padding:14px; border-radius:14px; }
    .resume-title{ font-size:15px; }
    .resume-subtitle{ font-size:13px; }
    .skill{ padding:9px 13px; font-size:12px; border-radius:10px; }
    .resume-download-btn{ font-size:13px; padding:9px 16px; }
    .contact-card{ flex:1 1 100%; padding:12px; border-radius:14px; gap:12px; }
    .contact-icon{ width:42px; height:42px; min-width:42px; font-size:17px; border-radius:10px; }
    .contact-text a, .contact-text p{ font-size:13px; }
    .portfolio-filter{ gap:8px; margin-bottom:18px; }
    .filter-btn{ padding:9px 13px; font-size:12px; border-radius:10px; }
    .project-card{ flex:1 1 100%; border-radius:16px; }
    .project-image{ height:160px; }
    .project-content{ padding:14px; }
    .project-title{ font-size:16px; }
    .project-desc{ font-size:13px; margin-bottom:12px; }
    .tech{ font-size:12px; padding:5px 10px; }
    .github-btn{ display:block; text-align:center; padding:10px; border-radius:10px; font-size:13px; }
    .placeholder{ font-size:14px; }
}

</style>
</head>
<body>

<div class="container">

    <div class="left">

        <div class="profile">
            <div class="img-box">
                <img id="profileImage" src="" alt="">
            </div>
            <div>
                <div id="name" class="name"></div>
                <div id="role" class="job"></div>
            </div>
        </div>

        <div class="line"></div>

        <div class="info-row">

            <div class="info">
                <div class="icon">✉</div>
                <div class="text">
                    <small>EMAIL</small>
                    <p id="email"></p>
                </div>
            </div>

            <div class="info">
                <div class="icon">📱</div>
                <div class="text">
                    <small>PHONE</small>
                    <p id="phone"></p>
                </div>
            </div>

            <div class="info">
                <div class="icon">📅</div>
                <div class="text">
                    <small>BIRTHDAY</small>
                    <p id="birthday"></p>
                </div>
            </div>

            <div class="info">
                <div class="icon">📍</div>
                <div class="text">
                    <small>LOCATION</small>
                    <p id="location"></p>
                </div>
            </div>

        </div>

    </div>

    <div class="right">

        <div class="menu">
            <button class="nav-btn active" onclick="showPage('about-page',this)">About</button>
            <button class="nav-btn" onclick="showPage('resume-page',this)">Resume</button>
            <button class="nav-btn" onclick="showPage('portfolio-page',this)">Portfolio</button>
            <button class="nav-btn" onclick="showPage('blog-page',this)">Blog</button>
            <button class="nav-btn" onclick="showPage('contact-page',this)">Contact</button>
        </div>

        <div class="content">

            <div id="about-page" class="page">
                <div class="title">About Me</div>
                <div class="yellow-line"></div>
                <div id="bio" class="para"></div>
                <div class="heading">What I'm Doing</div>
                <div id="cards" class="cards"></div>
            </div>

            <div id="resume-page" class="page hidden">
                <div class="title">Resume</div>
                <div class="yellow-line"></div>
                <div class="resume-download-wrap">
                    <a id="resume-download" class="resume-download-btn hidden" href="#" download>
                        <i class="fa-solid fa-download"></i>
                        Download Resume
                    </a>
                </div>
                <div class="resume-heading">Education</div>
                <div id="education-container"></div>
                <div class="resume-heading">Experience</div>
                <div id="experience-container"></div>
                <div class="resume-heading">Skills</div>
                <div id="skills-container" class="skills-container"></div>
            </div>

            <div id="portfolio-page" class="page hidden">
                <div class="title">Portfolio</div>
                <div class="yellow-line"></div>
                <div class="portfolio-filter">
                    <button class="filter-btn active-filter" onclick="filterProjects('All',this)">All</button>
                    <button class="filter-btn" onclick="filterProjects('Node.js',this)">Node.js</button>
                    <button class="filter-btn" onclick="filterProjects('Python',this)">Python</button>
                </div>
                <div id="project-container" class="project-container"></div>
            </div>

            <div id="blog-page" class="page hidden">
                <div class="title">Blog</div>
                <div class="yellow-line"></div>
                <p class="placeholder">Blog section coming soon.</p>
            </div>

            <div id="contact-page" class="page hidden">
                <div class="title">Contact</div>
                <div class="yellow-line"></div>
                <div class="contact-container">

                    <div class="contact-card">
                        <div class="contact-icon"><i class="fa-solid fa-envelope"></i></div>
                        <div class="contact-text">
                            <small>Email</small>
                            <a id="contact-email" href=""></a>
                        </div>
                    </div>

                    <div class="contact-card">
                        <div class="contact-icon"><i class="fa-solid fa-phone"></i></div>
                        <div class="contact-text">
                            <small>Phone</small>
                            <a id="contact-phone" href=""></a>
                        </div>
                    </div>

                    <div class="contact-card">
                        <div class="contact-icon"><i class="fa-brands fa-github"></i></div>
                        <div class="contact-text">
                            <small>GitHub</small>
                            <a id="contact-github" href="" target="_blank"></a>
                        </div>
                    </div>

                    <div class="contact-card">
                        <div class="contact-icon"><i class="fa-brands fa-linkedin"></i></div>
                        <div class="contact-text">
                            <small>LinkedIn</small>
                            <a id="contact-linkedin" href="" target="_blank"></a>
                        </div>
                    </div>

                    <div class="contact-card">
                        <div class="contact-icon"><i class="fa-brands fa-instagram"></i></div>
                        <div class="contact-text">
                            <small>Instagram</small>
                            <a id="contact-instagram" href="" target="_blank"></a>
                        </div>
                    </div>

                    <div class="contact-card">
                        <div class="contact-icon"><i class="fa-solid fa-location-dot"></i></div>
                        <div class="contact-text">
                            <small>Location</small>
                            <p id="contact-location"></p>
                        </div>
                    </div>

                </div>
            </div>

        </div>

    </div>

</div>

<script>

function showPage(pageId, button){
    const pages = document.querySelectorAll(".page");
    pages.forEach((page) => { page.style.display = "none"; });
    document.getElementById(pageId).style.display = "block";
    const buttons = document.querySelectorAll(".nav-btn");
    buttons.forEach((btn) => { btn.classList.remove("active"); });
    button.classList.add("active");
}

</script>

<script src="script.js"></script>

</body>
</html>
