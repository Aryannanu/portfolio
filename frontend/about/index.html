<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio UI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f0f0f;
    padding:30px;
    color:white;
}

.container{
    display:flex;
    gap:25px;
}

/* LEFT */
.left{
    width:320px;
    background:#1b1b1b;
    border:1px solid #2c2c2c;
    border-radius:30px;
    padding:30px 22px;
    height:fit-content;
}

.profile{
    text-align:center;
}

.img-box{
    width:160px;
    height:160px;
    background:#2a2a2a;
    margin:auto;
    border-radius:30px;
    overflow:hidden;
}

.img-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.name{
    font-size:28px;
    font-weight:600;
    margin-top:22px;
}

.job{
    display:inline-block;
    background:#292929;
    padding:10px 20px;
    border-radius:12px;
    margin-top:15px;
    color:#cfcfcf;
    font-size:14px;
}

.line{
    width:100%;
    height:1px;
    background:#2f2f2f;
    margin:30px 0;
}

.info{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:25px;
}

.icon{
    width:52px;
    height:52px;
    border-radius:14px;
    background:#242424;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    color:#f6c453;
}

.text small{
    color:#8c8c8c;
    font-size:12px;
    display:block;
    margin-bottom:4px;
}

.text p{
    font-size:14px;
}

/* RIGHT */
.right{
    flex:1;
    background:#1b1b1b;
    border-radius:30px;
    border:1px solid #2c2c2c;
    position:relative;
}

/* MENU */
.menu{
    position:absolute;
    top:0;
    right:0;
    background:#242424;
    padding:22px 35px;
    display:flex;
    gap:35px;
    border-top-right-radius:30px;
    border-bottom-left-radius:30px;
    z-index:10;
}

.menu button{
    background:none;
    border:none;
    color:#cfcfcf;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
}

.menu button:hover{
    color:#f6c453;
}

.active{
    color:#f6c453 !important;
}

.content{
    padding:110px 40px 40px;
}

.title{
    font-size:38px;
    font-weight:700;
}

.yellow-line{
    width:55px;
    height:5px;
    border-radius:10px;
    background:#f6c453;
    margin:15px 0 30px;
}

.para{
    color:#b5b5b5;
    line-height:1.9;
    margin-bottom:18px;
    font-size:15px;
}

.heading{
    font-size:32px;
    font-weight:600;
    margin-top:35px;
    margin-bottom:25px;
}

/* ABOUT CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.card{
    background:#222;
    border:1px solid #303030;
    border-radius:22px;
    padding:25px;
    display:flex;
    gap:20px;
}

.card-icon{
    font-size:34px;
    color:#f6c453;
}

.card-text h3{
    margin-bottom:10px;
}

.card-text p{
    color:#b8b8b8;
    line-height:1.7;
    font-size:14px;
}

/* PAGE SWITCH */
.hidden{
    display:none;
}

/* PLACEHOLDER */
.placeholder{
    color:#a8a8a8;
    font-size:18px;
    margin-top:30px;
}

/* RESPONSIVE */
@media(max-width:950px){

    .container{
        flex-direction:column;
    }

    .left{
        width:100%;
    }

    .cards{
        grid-template-columns:1fr;
    }

    .menu{
        position:static;
        border-radius:30px 30px 0 0;
        justify-content:center;
        flex-wrap:wrap;
    }

    .content{
        padding:40px 25px;
    }
}

/* RESUME */
.resume-heading{
    font-size:28px;
    font-weight:600;
    margin-top:40px;
    margin-bottom:25px;
}

.resume-card{
    background:#222;
    border:1px solid #303030;
    border-radius:22px;
    padding:22px;
    margin-bottom:20px;
}

.resume-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
}

.resume-title{
    font-size:20px;
    font-weight:600;
}

.resume-year{
    color:#f6c453;
    font-size:14px;
}

.resume-subtitle{
    color:#c9c9c9;
    margin-bottom:12px;
    font-size:15px;
}

.resume-desc{
    color:#a8a8a8;
    line-height:1.8;
    font-size:14px;
}

/* SKILLS */
.skills-container{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.skill{
    background:#242424;
    border:1px solid #303030;
    padding:14px 22px;
    border-radius:14px;
    color:#f6c453;
    transition:.3s;
}

.skill:hover{
    transform:translateY(-4px);
}

.resume-download-wrap{
    margin-bottom:30px;
}

.resume-download-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:#f6c453;
    color:#1b1b1b;
    padding:12px 24px;
    border-radius:14px;
    font-size:15px;
    font-weight:600;
    text-decoration:none;
    transition:.3s;
}

.resume-download-btn:hover{
    background:#e5b33f;
    transform:translateY(-2px);
}

.resume-download-btn.hidden{
    display:none;
}

.contact-container{
    display:grid;
    grid-template-columns:
    repeat(2,1fr);
    gap:20px;
}

.contact-card{
    background:#222;
    border:1px solid #303030;
    border-radius:22px;
    padding:25px;
    display:flex;
    align-items:center;
    gap:20px;
}

.contact-icon{
    width:60px;
    height:60px;
    border-radius:18px;
    background:#242424;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    color:#f6c453;
}

.contact-text small{
    color:#8d8d8d;
    display:block;
    margin-bottom:6px;
}

.contact-text a,
.contact-text p{
    color:white;
    text-decoration:none;
    font-size:15px;
    word-break:break-word;
}

.contact-text a:hover{
    color:#f6c453;
}

/* FILTER */
.portfolio-filter{
    display:flex;
    gap:15px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.filter-btn{
    background:#242424;
    border:1px solid #303030;
    color:#cfcfcf;
    padding:12px 22px;
    border-radius:14px;
    cursor:pointer;
    transition:.3s;
}

.filter-btn:hover{
    color:#f6c453;
}

.active-filter{
    background:#f6c453;
    color:#111;
    font-weight:600;
}

/* PROJECTS */
.project-container{
    display:grid;
    grid-template-columns:
    repeat(2,1fr);
    gap:22px;
}

.project-card{
    background:#222;
    border:1px solid #303030;
    border-radius:24px;
    overflow:hidden;
    transition:.3s;
}

.project-card:hover{
    transform:translateY(-5px);
}

.project-image{
    height:220px;
}

.project-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.project-content{
    padding:25px;
}

.project-title{
    font-size:22px;
    font-weight:600;
    margin-bottom:12px;
}

.project-desc{
    color:#b5b5b5;
    line-height:1.8;
    margin-bottom:20px;
    font-size:14px;
}

.tech-stack{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

.tech{
    background:#292929;
    color:#f6c453;
    padding:8px 14px;
    border-radius:12px;
    font-size:13px;
}

.github-btn{
    display:inline-block;
    text-decoration:none;
    background:#f6c453;
    color:#111;
    padding:12px 20px;
    border-radius:14px;
    font-weight:600;
    transition:.3s;
}

.github-btn:hover{
    transform:translateY(-3px);
}

@media(max-width:950px){

    .project-container{
        grid-template-columns:1fr;
    }

}
</style>
</head>
<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">

        <div class="profile">

            <div class="img-box">
                <img id="profileImage" src="" alt="">
            </div>

            <div id="name" class="name"></div>

            <div id="role" class="job"></div>

        </div>

        <div class="line"></div>

        <div class="info">
            <div class="icon">✉</div>
            <div class="text">
                <small>EMAIL</small>
                <p id="email"></p>
            </div>
        </div>

        <div class="info">
            <div class="icon">📱</div>
            <div class="text">
                <small>PHONE</small>
                <p id="phone"></p>
            </div>
        </div>

        <div class="info">
            <div class="icon">📅</div>
            <div class="text">
                <small>BIRTHDAY</small>
                <p id="birthday"></p>
            </div>
        </div>

        <div class="info">
            <div class="icon">📍</div>
            <div class="text">
                <small>LOCATION</small>
                <p id="location"></p>
            </div>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="right">

        <!-- MENU -->
        <div class="menu">

            <button class="nav-btn active"
            onclick="showPage('about-page',this)">
                About
            </button>

            <button class="nav-btn"
            onclick="showPage('resume-page',this)">
                Resume
            </button>

            <button class="nav-btn"
            onclick="showPage('portfolio-page',this)">
                Portfolio
            </button>

            <button class="nav-btn"
            onclick="showPage('blog-page',this)">
                Blog
            </button>

            <button class="nav-btn"
            onclick="showPage('contact-page',this)">
                Contact
            </button>

        </div>

        <div class="content">

            <!-- ABOUT -->
            <div id="about-page" class="page">

                <div class="title">
                    About Me
                </div>

                <div class="yellow-line"></div>

                <div id="bio" class="para"></div>

                <div class="heading">
                    What I'm Doing
                </div>

                <div id="cards" class="cards"></div>

            </div>

            <!-- RESUME -->
            <div id="resume-page"
            class="page hidden">

                <div class="title">
        Resume
    </div>

    <div class="yellow-line"></div>

    <div class="resume-download-wrap">
        <a id="resume-download"
        class="resume-download-btn hidden"
        href="#"
        download>
            <i class="fa-solid fa-download"></i>
            Download Resume
        </a>
    </div>

    <!-- EDUCATION -->
    <div class="resume-heading">
        Education
    </div>

    <div id="education-container">

        <!-- dynamic education -->

    </div>

    <!-- EXPERIENCE -->
    <div class="resume-heading">
        Experience
    </div>

    <div id="experience-container">

        <!-- dynamic experience -->

    </div>

    <!-- SKILLS -->
    <div class="resume-heading">
        Skills
    </div>

    <div id="skills-container"
    class="skills-container">

        <!-- dynamic skills -->

    </div>

            </div>

            <!-- PORTFOLIO -->
            <div id="portfolio-page"
            class="page hidden">

                <div class="title">
        Portfolio
    </div>

    <div class="yellow-line"></div>

    <!-- FILTER BUTTONS -->
    <div class="portfolio-filter">

        <button
        class="filter-btn active-filter"
        onclick="filterProjects('All',this)">
            All
        </button>

        <button
        class="filter-btn"
        onclick="filterProjects('Node.js',this)">
            Node.js
        </button>

        <button
        class="filter-btn"
        onclick="filterProjects('Python',this)">
            Python
        </button>

    </div>

    <!-- PROJECTS -->
    <div id="project-container"
    class="project-container">

    </div>

            </div>

            <!-- BLOG -->
            <div id="blog-page"
            class="page hidden">

                <div class="title">
                    Blog
                </div>

                <div class="yellow-line"></div>

                <p class="placeholder">
                    Blog section coming soon.
                </p>

            </div>

            <!-- CONTACT -->
            <div id="contact-page"
            class="page hidden">

               <div class="title">
        Contact
    </div>

    <div class="yellow-line"></div>

    <div class="contact-container">

        <!-- EMAIL -->
        <div class="contact-card">

            <div class="contact-icon">
                <i class="fa-solid fa-envelope"></i>
            </div>

            <div class="contact-text">

                <small>Email</small>

                <a id="contact-email"
                href="">
                </a>

            </div>

        </div>

        <!-- PHONE -->
        <div class="contact-card">

            <div class="contact-icon">
                <i class="fa-solid fa-phone"></i>
            </div>

            <div class="contact-text">

                <small>Phone</small>

                <a id="contact-phone"
                href="">
                </a>

            </div>

        </div>

        <!-- GITHUB -->
        <div class="contact-card">

            <div class="contact-icon">
                <i class="fa-brands fa-github"></i>
            </div>

            <div class="contact-text">

                <small>GitHub</small>

                <a id="contact-github"
                href=""
                target="_blank">
                </a>

            </div>

        </div>

        <!-- LINKEDIN -->
        <div class="contact-card">

            <div class="contact-icon">
                <i class="fa-brands fa-linkedin"></i>
            </div>

            <div class="contact-text">

                <small>LinkedIn</small>

                <a id="contact-linkedin"
                href=""
                target="_blank">
                </a>

            </div>

        </div>

        <!-- INSTAGRAM -->
        <div class="contact-card">

            <div class="contact-icon">
                <i class="fa-brands fa-instagram"></i>
            </div>

            <div class="contact-text">

                <small>Instagram</small>

                <a id="contact-instagram"
                href=""
                target="_blank">
                </a>

            </div>

        </div>

        <!-- LOCATION -->
        <div class="contact-card">

            <div class="contact-icon">
                <i class="fa-solid fa-location-dot"></i>
            </div>

            <div class="contact-text">

                <small>Location</small>

                <p id="contact-location">
                </p>

            </div>

        </div>

    </div>
        </div>

    </div>

            </div>

        </div>

    </div>

</div>

<script>

function showPage(pageId,button){

    const pages =
    document.querySelectorAll(
        ".page"
    );

    pages.forEach((page)=>{
        page.style.display =
        "none";
    });

    document
    .getElementById(pageId)
    .style.display =
    "block";

    const buttons =
    document.querySelectorAll(
        ".nav-btn"
    );

    buttons.forEach((btn)=>{
        btn.classList
        .remove("active");
    });

    button.classList
    .add("active");
}

</script>

<script src="script.js"></script>

</body>
</html>
